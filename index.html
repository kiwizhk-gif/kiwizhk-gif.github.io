<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🧧 HERMES 财神 PRO</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0a;--gold:#FFD700;--red:#DC143C;--green:#00FF88;--loss:#FF4444;
  --panel:#111;--border:#222;--text:#ccc;--dim:#666;
}
body{background:var(--bg);color:var(--text);font-family:'Courier New',monospace;min-height:100vh}
.header{
  background:linear-gradient(180deg,#1a0000,#0a0a0a);border-bottom:2px solid var(--gold);
  padding:12px;text-align:center
}
.header h1{color:var(--gold);font-size:1.2em;text-shadow:0 0 20px rgba(255,215,0,.3)}
.header .sub{color:var(--dim);font-size:.6em;letter-spacing:2px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:4px;padding:8px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;padding:8px}
.card{
  background:var(--panel);border:1px solid var(--border);padding:8px;
  border-radius:4px;text-align:center
}
.card .lbl{font-size:.55em;color:var(--dim);text-transform:uppercase;letter-spacing:1px}
.card .val{font-size:1.1em;font-weight:bold;color:var(--gold);margin:4px 0}
.card .sub{font-size:.55em;color:var(--dim)}
.green{color:var(--green)}.red{color:var(--loss)}.gold{color:var(--gold)}
.section{
  border-top:2px solid var(--gold);padding:8px 12px;
  font-size:.65em;color:var(--gold);letter-spacing:2px;
  display:flex;justify-content:space-between
}
.pos-card{
  background:var(--panel);border-left:3px solid var(--gold);
  margin:4px 8px;padding:8px 12px;border-radius:0 4px 4px 0
}
.pos-row{display:flex;justify-content:space-between;font-size:.65em;margin:2px 0}
.trade-row{
  display:grid;grid-template-columns:32px 1fr 70px;gap:6px;
  padding:6px 8px;border-bottom:1px solid var(--border);font-size:.6em;align-items:center
}
.badge{padding:2px 4px;border-radius:2px;text-align:center;font-size:.75em;font-weight:bold}
.badge-buy{background:rgba(0,255,136,.1);color:var(--green)}
.badge-sell{background:rgba(255,68,68,.1);color:var(--loss)}
.tab-bar{display:flex;background:var(--panel);border-bottom:1px solid var(--border)}
.tab{flex:1;text-align:center;padding:8px;font-size:.6em;cursor:pointer;color:var(--dim);border-bottom:2px solid transparent}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-content{display:none}.tab-content.active{display:block}
.footer{text-align:center;padding:12px;font-size:.55em;color:var(--dim);border-top:1px solid var(--gold);margin-top:8px}
.blink{animation:blink 1.5s infinite}@keyframes blink{50%{opacity:.4}}
.err{color:var(--loss);font-size:.55em;padding:20px;text-align:center}
</style>
</head>
<body>

<div class="header">
  <h1>🧧 HERMES 财神 PRO</h1>
  <div class="sub">🔥 SPOT + PERPS AUTO-TRADER 🔥</div>
</div>

<!-- SCOREBOARD -->
<div class="grid3" id="scoreboard"></div>

<!-- TABS -->
<div class="tab-bar">
  <div class="tab active" onclick="switchTab('spot')">📊 SPOT</div>
  <div class="tab" onclick="switchTab('perps')">⚡ PERPS</div>
  <div class="tab" onclick="switchTab('trades')">📜 TRADES</div>
</div>

<!-- SPOT TAB -->
<div class="tab-content active" id="tab-spot">
  <div class="section"><span>🔫 POSITIONS</span><span id="spotPosCount">0</span></div>
  <div id="spotPositions"><div class="err">Loading...</div></div>
  <div class="section"><span>📊 PERFORMANCE</span></div>
  <div id="spotPerf" style="padding:8px"></div>
</div>

<!-- PERPS TAB -->
<div class="tab-content" id="tab-perps">
  <div class="section"><span>⚡ PERP POSITIONS</span><span id="perpPosCount">0</span></div>
  <div id="perpPositions"><div class="err">Loading...</div></div>
  <div class="section"><span>📊 PERP METRICS</span></div>
  <div id="perpPerf" style="padding:8px"></div>
</div>

<!-- TRADES TAB -->
<div class="tab-content" id="tab-trades">
  <div class="section"><span>📜 TRADE LOG</span><span id="tradeCount">0</span></div>
  <div id="tradeList"><div class="err">Loading...</div></div>
</div>

<div class="footer">
  <span class="blink">🟢 LIVE</span> · Auto-refresh 3s · 
  <span id="clock">--:--:--</span><br>
  🧧 恭喜发财 · 招财进宝 🧧
</div>

<script>
// ===== CONFIG =====
const DATA_URL = 'https://raw.githubusercontent.com/kiwizhk-gif/kiwizhk-gif.github.io/main/dash_data.json';
const SOL_PRICE_URL = 'https://api.jup.ag/price/v2?ids=So11111111111111111111111111111111111111112';

let solPrice = 0, data = null, activeTab = 'spot';

// ===== FETCH =====
async function fetchData() {
  try {
    const r = await fetch(DATA_URL + '?t=' + Date.now(), {cache:'no-store'});
    if (!r.ok) throw new Error(r.status);
    data = await r.json();
  } catch(e) { data = null; }
  try {
    const r = await fetch(SOL_PRICE_URL, {cache:'no-store'});
    if (r.ok) { const j = await r.json(); solPrice = j?.data?.So11111111111111111111111111111111111111112?.price || 0; }
  } catch(e) {}
}

// ===== HELPERS =====
const F = (v,d=4) => (v||0).toFixed(d);
const USD = (sol) => solPrice ? '$' + (sol*solPrice).toFixed(2) : '--';
const PNL = (v) => v >= 0 ? `<span class="green">+${F(v)}</span>` : `<span class="red">${F(v)}</span>`;

// ===== RENDER =====
function renderScoreboard() {
  if (!data) return;
  const m = data.metrics || {};
  const bal = data.balance || 0;
  const pnl = data.pnl || 0;
  
  document.getElementById('scoreboard').innerHTML = `
    <div class="card">
      <div class="lbl">💰 BALANCE</div>
      <div class="val">${F(bal)} SOL</div>
      <div class="sub">${USD(bal)}</div>
    </div>
    <div class="card">
      <div class="lbl">📈 PnL</div>
      <div class="val ${pnl>=0?'green':'red'}">${pnl>=0?'+':''}${F(pnl)} SOL</div>
      <div class="sub">${USD(pnl)}</div>
    </div>
    <div class="card">
      <div class="lbl">⚡ WIN%</div>
      <div class="val">${m.win_rate||0}%</div>
      <div class="sub">${m.wins||0}W/${m.losses||0}L</div>
    </div>
  `;
}

function renderSpot() {
  if (!data) { document.getElementById('spotPositions').innerHTML='<div class="err">No data</div>'; return; }
  
  const pos = data.positions || [];
  document.getElementById('spotPosCount').textContent = pos.length + ' POS';
  
  if (!pos.length) {
    document.getElementById('spotPositions').innerHTML = '<div class="err">🧘 Waiting for snipes...</div>';
  } else {
    document.getElementById('spotPositions').innerHTML = pos.map((p,i) => `
      <div class="pos-card">
        <div class="pos-row"><strong>${i+1}. ${(p.name||p.symbol||'???').slice(0,25)}</strong><span class="gold">${p.symbol||''}</span></div>
        <div class="pos-row"><span>Entry</span><span>${F(p.entrySol||0)} SOL</span></div>
        <div class="pos-row"><span>Tokens</span><span>${(p.entryTokens||0).toExponential(1)}</span></div>
        ${p.buyTx ? `<div class="pos-row"><span>TX</span><a href="https://solscan.io/tx/${p.buyTx}" target="_blank" style="color:var(--gold);font-size:.8em">${p.buyTx.slice(0,12)}...</a></div>` : ''}
      </div>
    `).join('');
  }
  
  const m = data.metrics || {};
  document.getElementById('spotPerf').innerHTML = `
    <div class="pos-row"><span>Trades</span><span>${m.total_trades||0} (${m.buys||0}B/${m.sells||0}S)</span></div>
    <div class="pos-row"><span>Win Rate</span><span>${m.win_rate||0}%</span></div>
    <div class="pos-row"><span>ROI</span><span class="${(m.roi_pct||0)>=0?'green':'red'}">${(m.roi_pct||0)>=0?'+':''}${m.roi_pct||0}%</span></div>
    <div class="pos-row"><span>Profit Factor</span><span>${m.profit_factor||0}x</span></div>
    <div class="pos-row"><span>Best</span><span class="green">+${F(m.biggest_win||0)} SOL</span></div>
    <div class="pos-row"><span>Worst</span><span class="red">${F(m.biggest_loss||0)} SOL</span></div>
    <div class="pos-row"><span>Max DD</span><span class="red">${F(m.max_drawdown||0)} SOL</span></div>
    <div class="pos-row"><span>Sharpe</span><span>${F(m.sharpe||0,2)}</span></div>
  `;
}

function renderPerps() {
  const pp = data?.perps || {};
  const pos = pp.positions || [];
  document.getElementById('perpPosCount').textContent = pos.length + ' POS';
  
  if (!pos.length) {
    document.getElementById('perpPositions').innerHTML = '<div class="err">⚡ No perp positions</div>';
  } else {
    document.getElementById('perpPositions').innerHTML = pos.map((p,i) => `
      <div class="pos-card" style="border-left-color:${p.side==='long'?'var(--green)':'var(--loss)'}">
        <div class="pos-row"><strong>${p.market||'???'}</strong><span>${(p.side||'').toUpperCase()} ${p.leverage||1}x</span></div>
        <div class="pos-row"><span>Size</span><span>${F(p.size||0)} USD</span></div>
        <div class="pos-row"><span>PnL</span>${PNL(p.pnl||0)}</div>
      </div>
    `).join('');
  }
  
  const m = pp.metrics || {};
  document.getElementById('perpPerf').innerHTML = `
    <div class="pos-row"><span>Total Trades</span><span>${m.total||0}</span></div>
    <div class="pos-row"><span>Win Rate</span><span>${m.winRate||0}%</span></div>
    <div class="pos-row"><span>Total PnL</span>${PNL(m.totalPnl||0)}</div>
  `;
}

function renderTrades() {
  const trades = data?.trades || [];
  document.getElementById('tradeCount').textContent = trades.length + ' TX';
  
  if (!trades.length) {
    document.getElementById('tradeList').innerHTML = '<div class="err">📜 No trades yet</div>';
    return;
  }
  
  document.getElementById('tradeList').innerHTML = trades.slice(-50).reverse().map(t => {
    const isBuy = t.type === 'BUY';
    const pnlStr = t.pnl != null ? PNL(t.pnl) : '';
    return `
      <div class="trade-row">
        <span class="badge ${isBuy?'badge-buy':'badge-sell'}">${t.type}</span>
        <div>
          <div>${isBuy?'🟢':'🔴'} ${(t.symbol||'???').slice(0,20)}</div>
          <div style="font-size:.8em;color:var(--dim)">${(t.time_iso||'')} · ${F(t.sol)} SOL</div>
        </div>
        <div style="text-align:right;font-weight:bold">${pnlStr}</div>
      </div>`;
  }).join('');
}

function renderAll() {
  renderScoreboard();
  if (activeTab === 'spot') renderSpot();
  else if (activeTab === 'perps') renderPerps();
  else if (activeTab === 'trades') renderTrades();
}

// ===== TABS =====
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab:nth-child(${tab==='spot'?1:tab==='perps'?2:3})`).classList.add('active');
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  renderAll();
}

// ===== CLOCK =====
function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('th-TH');
}

// ===== MAIN =====
async function refresh() {
  await fetchData();
  renderAll();
  updateClock();
}

refresh();
setInterval(refresh, 3000);
</script>
</body>
</html>
