<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>HXBT — Hermes Trading Terminal</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0a0c10; --panel: #111318; --panel2: #161920;
  --border: #1e222b; --border2: #252a35;
  --text: #c8ccd4; --text2: #7a7f8a; --text3: #555a65;
  --green: #00c853; --green2: #00e676; --green-bg: rgba(0,200,83,0.08);
  --red: #ff1744; --red2: #ff5252; --red-bg: rgba(255,23,68,0.08);
  --blue: #448aff; --accent: #ffab00; --cyan: #00bcd4;
  --buy: #00c853; --sell: #ff1744;
  --font: 'SF Mono','JetBrains Mono','Fira Code','Consolas',monospace;
  --radius: 4px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:var(--font); background:var(--bg); color:var(--text);
  font-size:11px; line-height:1.5; min-height:100vh;
  -webkit-font-smoothing:antialiased;
}

/* Top Bar */
.topbar{
  background:var(--panel); border-bottom:1px solid var(--border);
  padding:6px 12px; display:flex; align-items:center; gap:12px;
  position:sticky; top:0; z-index:10; flex-wrap:wrap;
}
.topbar-logo{font-weight:900;font-size:13px;color:var(--accent);letter-spacing:-0.5px}
.topbar-sep{width:1px;height:16px;background:var(--border2)}
.topbar-item{display:flex;flex-direction:column;min-width:60px}
.topbar-label{font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:1px}
.topbar-val{font-size:12px;font-weight:700;font-variant-numeric:tabular-nums}
.topbar-val.g{color:var(--green)} .topbar-val.r{color:var(--red)}
.topbar-status{font-size:9px;padding:2px 8px;border-radius:2px;letter-spacing:1px}
.status-live{background:rgba(0,200,83,0.15);color:var(--green);border:1px solid rgba(0,200,83,0.25)}

.container{max-width:560px;margin:0 auto;padding:8px}

/* Section */
.section{margin-bottom:8px}
.section-hdr{
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 10px;background:var(--panel);border:1px solid var(--border);
  border-radius:var(--radius) var(--radius) 0 0;font-size:9px;
  text-transform:uppercase;letter-spacing:2px;color:var(--text2);
}

/* Blotter Table */
.blotter{width:100%;border-collapse:collapse;font-size:10px}
.blotter th{
  background:var(--panel);color:var(--text2);font-weight:600;
  padding:6px 8px;text-align:left;font-size:8px;text-transform:uppercase;
  letter-spacing:1px;border-bottom:1px solid var(--border2);
  white-space:nowrap;
}
.blotter td{
  padding:5px 8px;border-bottom:1px solid rgba(255,255,255,0.02);
  font-variant-numeric:tabular-nums;white-space:nowrap;
}
.blotter tr:hover td{background:rgba(255,255,255,0.02)}
.blotter .buy-row td:first-child{color:var(--buy)}
.blotter .sell-row td:first-child{color:var(--sell)}
.pnl-pos{color:var(--green)} .pnl-neg{color:var(--red)}
.tx-link{color:var(--blue);text-decoration:none;font-size:9px}
.tx-link:hover{text-decoration:underline}

/* Metrics Grid */
.metrics-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:1px;
  background:var(--border);border:1px solid var(--border);
}
.metric-box{
  background:var(--panel2);padding:8px 6px;text-align:center;
}
.metric-val{font-size:14px;font-weight:700;font-variant-numeric:tabular-nums}
.metric-lbl{font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-top:2px}

/* Summary Cards */
.cards{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border)}
.card{
  background:var(--panel2);padding:10px;
}
.card-val{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums}
.card-lbl{font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:1px}

/* Chart */
.chart-wrap{position:relative;height:180px;background:var(--panel2);border:1px solid var(--border);padding:8px}

/* Position */
.pos-row{
  display:flex;align-items:center;gap:10px;padding:8px 10px;
  background:var(--panel2);border:1px solid var(--border);margin-bottom:2px;
}
.pos-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0}
.pos-info{flex:1}
.pos-sym{font-weight:700;font-size:12px}
.pos-meta{font-size:9px;color:var(--text3)}
.pos-entry{text-align:right;font-size:10px}

/* Footer */
.ftr{text-align:center;padding:12px;color:var(--text3);font-size:9px;letter-spacing:1px}

/* Mobile */
@media(max-width:400px){
  .blotter{font-size:9px} .blotter td,.blotter th{padding:4px 5px}
  .metrics-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<div class="topbar" id="topbar">
  <span class="topbar-logo">HXBT</span>
  <span class="topbar-sep"></span>
  <div class="topbar-item">
    <span class="topbar-label">BALANCE</span>
    <span class="topbar-val" id="tb-bal">—</span>
  </div>
  <div class="topbar-item">
    <span class="topbar-label">PnL</span>
    <span class="topbar-val" id="tb-pnl">—</span>
  </div>
  <div class="topbar-item">
    <span class="topbar-label">ROI</span>
    <span class="topbar-val" id="tb-roi">—</span>
  </div>
  <span class="topbar-sep"></span>
  <span class="topbar-status status-live" id="tb-status">● LIVE</span>
  <span style="font-size:9px;color:var(--text3);margin-left:auto" id="tb-time">—</span>
</div>

<div class="container" id="app"><div style="text-align:center;padding:60px;color:var(--text3)">LOADING...</div></div>

<script>
const API = 'https://raw.githubusercontent.com/kiwizhk-gif/kiwizhk-gif.github.io/main/dash_data.json';
let chart = null;

async function fetchData() {
  try { const r = await fetch(API+'?t='+Date.now()); if(!r.ok) throw new Error(); return await r.json(); }
  catch(e) { return null; }
}

function f(n,d=4) { return n!=null ? Number(n).toFixed(d) : '—'; }
function pnlClass(v) { return v>0?'g':'r'; }

function render(data) {
  if(!data) { document.getElementById('app').innerHTML='<div style="text-align:center;padding:60px;color:var(--red)">CONNECTION LOST</div>'; return; }

  const m = data.metrics || {};
  const trades = data.trades || [];
  const txs = data.tx_history || [];
  const pos = data.positions || [];
  const solPrice = m.sol_price_usd || 145;
  const bal = data.balance || 0;
  const pnl = data.pnl || 0;

  // Topbar
  document.getElementById('tb-bal').textContent = f(bal,4) + ' SOL';
  document.getElementById('tb-pnl').textContent = (pnl>=0?'+':'') + f(pnl,4) + ' SOL';
  document.getElementById('tb-pnl').className = 'topbar-val ' + pnlClass(pnl);
  document.getElementById('tb-roi').textContent = (m.roi_pct>=0?'+':'') + f(m.roi_pct,1) + '%';
  document.getElementById('tb-roi').className = 'topbar-val ' + pnlClass(m.roi_pct);
  document.getElementById('tb-time').textContent = new Date().toLocaleTimeString('en-GB',{hour12:false});

  // Chart data
  let cum=0; const cLbls=[], cData=[];
  trades.forEach(t=>{if(t.type==='SELL'||t.type==='STOP'){cum+=t.pnl||0;cLbls.push(t.symbol);cData.push(cum.toFixed(6));}});

  document.getElementById('app').innerHTML = `
    <!-- Key Metrics -->
    <div class="section">
      <div class="section-hdr"><span>KEY METRICS</span><span>${data.updated_at_iso||''}</span></div>
      <div class="metrics-grid">
        <div class="metric-box"><div class="metric-val">${f(bal,4)}</div><div class="metric-lbl">Balance SOL</div></div>
        <div class="metric-box"><div class="metric-val ${pnlClass(pnl)}">${pnl>=0?'+':''}${f(pnl,4)}</div><div class="metric-lbl">Total PnL</div></div>
        <div class="metric-box"><div class="metric-val ${pnlClass(m.roi_pct)}">${m.roi_pct>=0?'+':''}${f(m.roi_pct,1)}%</div><div class="metric-lbl">ROI</div></div>
        <div class="metric-box"><div class="metric-val">${m.win_rate||0}%</div><div class="metric-lbl">Win Rate</div></div>
        <div class="metric-box"><div class="metric-val ${pnlClass(m.profit_factor-1)}">${f(m.profit_factor,2)}x</div><div class="metric-lbl">Profit Factor</div></div>
        <div class="metric-box"><div class="metric-val">${f(m.sharpe,2)}</div><div class="metric-lbl">Sharpe Ratio</div></div>
      </div>
    </div>

    <!-- Summary -->
    <div class="section">
      <div class="section-hdr"><span>PERFORMANCE SUMMARY</span></div>
      <div class="cards">
        <div class="card"><div class="card-val">${f(bal*145,2)}</div><div class="card-lbl">USD Value</div></div>
        <div class="card"><div class="card-val">${m.total_trades||0}</div><div class="card-lbl">Total Trades</div></div>
        <div class="card"><div class="card-val g">${m.wins||0}</div><div class="card-lbl">Wins</div></div>
        <div class="card"><div class="card-val r">${m.losses||0}</div><div class="card-lbl">Losses</div></div>
        <div class="card"><div class="card-val g">+${f(m.avg_win)}</div><div class="card-lbl">Avg Win SOL</div></div>
        <div class="card"><div class="card-val r">${f(m.avg_loss)}</div><div class="card-lbl">Avg Loss SOL</div></div>
        <div class="card"><div class="card-val g">+${f(m.biggest_win)}</div><div class="card-lbl">Best Trade</div></div>
        <div class="card"><div class="card-val r">${f(m.biggest_loss)}</div><div class="card-lbl">Worst Trade</div></div>
      </div>
    </div>

    <!-- Chart -->
    ${cData.length>=2?`
    <div class="section">
      <div class="section-hdr"><span>CUMULATIVE P&L</span><span>SOL</span></div>
      <div class="chart-wrap"><canvas id="pnlChart"></canvas></div>
    </div>`:''}

    ${cData.length>=2?`
    <div class="section">
      <div class="section-hdr"><span>P&L DISTRIBUTION</span></div>
      <div class="cards">
        <div class="card"><div class="card-val">${f(m.avg_win/abs(m.avg_loss||0.0001),2)}x</div><div class="card-lbl">Win/Loss Ratio</div></div>
        <div class="card"><div class="card-val r">${f(m.max_drawdown)}</div><div class="card-lbl">Max Drawdown SOL</div></div>
        <div class="card"><div class="card-val">${f(m.total_bought)}</div><div class="card-lbl">Total Bought SOL</div></div>
        <div class="card"><div class="card-val">${f(m.total_sold)}</div><div class="card-lbl">Total Sold SOL</div></div>
      </div>
    </div>`:''}

    <!-- Positions -->
    ${pos.length>0?`
    <div class="section">
      <div class="section-hdr"><span>OPEN POSITIONS</span><span>${pos.length} ACTIVE</span></div>
      ${pos.map(p=>`
        <div class="pos-row">
          <div class="pos-dot"></div>
          <div class="pos-info">
            <div class="pos-sym">$${p.symbol||'???'}</div>
            <div class="pos-meta">MCAP $${(p.mcap||0).toLocaleString()} · Entry ${f(p.entry_sol)} SOL · Age ${(p.age||0).toFixed(0)}s</div>
          </div>
          <div class="pos-entry">${f(p.entry_sol)} SOL</div>
        </div>
      `).join('')}
    </div>`:''}

    <!-- Trade Blotter -->
    <div class="section">
      <div class="section-hdr"><span>TRADE BLOTTER</span><span>${trades.length} TX</span></div>
      <div style="overflow-x:auto">
        <table class="blotter">
          <thead><tr><th>T</th><th>TIME</th><th>TOKEN</th><th>AMOUNT</th><th>PnL</th><th>PnL%</th><th>SLIPPAGE</th><th>TX</th></tr></thead>
          <tbody>
            ${trades.slice().reverse().map(t=>{
              const pnl = t.pnl;
              const pnlPct = pnl!=null && t.sol>0 ? ((pnl/t.sol)*100) : null;
              const rowClass = t.type==='BUY'?'buy-row':(pnl>=0?'sell-row':'sell-row');
              return `<tr class="${rowClass}">
                <td>${t.type==='BUY'?'B':t.type==='SELL'?'S':'X'}</td>
                <td>${t.time_iso||'—'}</td>
                <td><b>$${t.symbol||'???'}</b></td>
                <td>${f(t.sol)}</td>
                <td class="${pnl>=0?'pnl-pos':'pnl-neg'}">${pnl!=null?(pnl>=0?'+':'')+f(pnl):'—'}</td>
                <td class="${pnlPct>=0?'pnl-pos':'pnl-neg'}">${pnlPct!=null?(pnlPct>=0?'+':'')+f(pnlPct,1)+'%':'—'}</td>
                <td>${t.price_impact?f(parseFloat(t.price_impact)*100,2)+'%':'—'}</td>
                <td><a class="tx-link" href="https://solscan.io/tx/${t.tx_full||''}" target="_blank">${(t.tx_full||'').slice(0,8)}..</a></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>

    <!-- Footer -->
    <div class="ftr">
      HXBT TERMINAL v1.0 · AUTO-REFRESH 30S · <span id="ftr-time">—</span> ICT
    </div>
  `;

  // Chart
  if(cData.length>=2) setTimeout(()=>{
    const cvs=document.getElementById('pnlChart'); if(!cvs) return;
    if(chart) chart.destroy();
    const last=cData[cData.length-1];
    chart=new Chart(cvs,{
      type:'line',data:{labels:cLbls,datasets:[{
        data:cData,borderColor:last>=0?'#00c853':'#ff1744',
        backgroundColor:ctx=>{const g=ctx.chart.ctx.createLinearGradient(0,0,0,180);g.addColorStop(0,last>=0?'rgba(0,200,83,0.2)':'rgba(255,23,68,0.2)');g.addColorStop(1,'transparent');return g},
        borderWidth:1.5,fill:true,tension:0.3,pointRadius:2,pointBackgroundColor:last>=0?'#00c853':'#ff1744'
      }]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
        scales:{x:{grid:{color:'rgba(255,255,255,0.03)'},ticks:{color:'#555',font:{size:8}}},y:{grid:{color:'rgba(255,255,255,0.03)'},ticks:{color:'#555',font:{size:8},callback:v=>v+' SOL'}}}
      }
    });
  },200);

  // Footer clock
  setInterval(()=>{const el=document.getElementById('ftr-time');if(el)el.textContent=new Date().toLocaleTimeString('en-GB',{hour12:false});},1000);
}

fetchData().then(render);
setInterval(async()=>{const d=await fetchData();if(d)render(d);},30000);
</script>
</body>
</html>
