   247|// Particle system
   248|const canvas = document.getElementById('particles');

   251|function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
   252|resize(); window.addEventListener('resize', resize);
   253|class Particle {
   254|  constructor() { this.reset(); this.y = Math.random() * canvas.height; }
   255|  reset() { this.x = Math.random() * canvas.width; this.y = -5; this.vx = (Math.random()-0.5)*0.5; this.vy = 0.3 + Math.random()*0.7; this.size = Math.random()*1.5+0.5; this.opacity = Math.random()*0.5+0.2; }
   256|  update() { this.x += this.vx; this.y += this.vy; if (this.y > canvas.height+5) this.reset(); if (this.x<0) this.x=canvas.width; if (this.x>canvas.width) this.x=0; }
   257|  draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fillStyle = `rgba(0,200,255,${this.opacity})`; ctx.fill(); }
   258|}
   259|for (let i=0; i<80; i++) particles.push(new Particle());
