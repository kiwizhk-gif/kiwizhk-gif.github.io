<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>J.A.R.V.I.S. — Trading Intelligence</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #000a14;
  --surface: rgba(0,20,50,0.85);
  --surface2: rgba(0,30,70,0.7);
  --border: rgba(0,180,255,0.15);
  --glow: rgba(0,200,255,0.4);
  --cyan: #00d4ff;
  --cyan2: #00a8cc;
  --blue: #0066ff;
  --green: #00ff88;
  --red: #ff3366;
  --gold: #ffcc00;
  --white: #e0f0ff;
  --text: #a0c8e0;
  --dim: #406080;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'SF Mono', 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
}

/* Particle BG */
canvas#particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

/* Scan line */
.scanline {
  position: fixed; inset: 0; z-index: 999; pointer-events: none;
  background: linear-gradient(transparent 50%, rgba(0,180,255,0.02) 50%);
  background-size: 100% 4px;
}

/* Main */
.app { position: relative; z-index: 1; max-width: 500px; margin: 0 auto; padding: 10px; }

/* JARVIS Orb */
.orb-section {
  display: flex; flex-direction: column; align-items: center; padding: 16px 0 10px;
}
.orb {
  width: 100px; height: 100px; border-radius: 50%;
  position: relative;
  background: radial-gradient(circle at 35% 35%, rgba(0,200,255,0.3), rgba(0,50,150,0.1) 60%, transparent);
  border: 1px solid rgba(0,200,255,0.3);
  box-shadow: 0 0 40px rgba(0,180,255,0.2), inset 0 0 30px rgba(0,150,255,0.1);
  animation: orbPulse 3s ease-in-out infinite;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 6px;
}
.orb-inner {
  width: 50px; height: 50px; border-radius: 50%;
  background: radial-gradient(circle, rgba(0,220,255,0.6), rgba(0,100,200,0.2));
  box-shadow: 0 0 20px var(--glow);
  animation: innerGlow 2s ease-in-out infinite;
}
@keyframes orbPulse {
  0%,100% { box-shadow: 0 0 40px rgba(0,180,255,0.2), inset 0 0 30px rgba(0,150,255,0.1); }
  50% { box-shadow: 0 0 60px rgba(0,200,255,0.35), inset 0 0 40px rgba(0,180,255,0.15); }
}
@keyframes innerGlow {
  0%,100% { transform: scale(1); opacity: 0.8; }
  50% { transform: scale(1.15); opacity: 1; }
}
.orb-ring {
  position: absolute; inset: -8px; border-radius: 50%;
  border: 1px solid transparent;
  border-top-color: rgba(0,200,255,0.4);
  animation: spin 4s linear infinite;
}
.orb-ring:nth-child(3) { inset: -16px; animation-duration: 6s; border-top-color: rgba(0,150,255,0.2); }
@keyframes spin { to { transform: rotate(360deg); } }

.jarvis-label {
  font-size: 11px; letter-spacing: 4px; color: var(--cyan);
  text-transform: uppercase; margin-bottom: 2px; opacity: 0.7;
}
.jarvis-greeting {
  font-size: 12px; color: var(--cyan2); letter-spacing: 2px;
  animation: fadeText 3s ease-in-out infinite;
}
@keyframes fadeText { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }

/* Panel */
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
  margin-bottom: 10px;
  position: relative;
  backdrop-filter: blur(20px);
}
.panel::before {
  content: ''; position: absolute; top: 0; left: 16px; right: 16px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--cyan), transparent);
  opacity: 0.5;
}
.panel-header {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
}
.panel-title {
  font-size: 10px; letter-spacing: 3px; color: var(--cyan); text-transform: uppercase;
  display: flex; align-items: center; gap: 8px;
}
.panel-title::before { content: '◆'; font-size: 6px; }
.panel-badge {
  font-size: 9px; padding: 2px 8px; border: 1px solid rgba(0,200,255,0.2);
  border-radius: 2px; color: var(--cyan2); letter-spacing: 1px;
}

/* Hero Balance */
.hero {
  text-align: center; padding: 6px 0;
}
.balance-num {
  font-size: 52px; font-weight: 300; letter-spacing: -2px;
  color: var(--cyan);
  text-shadow: 0 0 30px rgba(0,200,255,0.3);
  font-variant-numeric: tabular-nums;
}
.balance-unit {
  font-size: 13px; color: var(--dim); letter-spacing: 3px; margin-top: 2px;
}
.pnl-hero {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 14px; padding: 4px 14px; margin-top: 6px;
  border: 1px solid; letter-spacing: 1px;
}
.pnl-up { color: var(--green); border-color: rgba(0,255,136,0.3); background: rgba(0,255,136,0.05); }
.pnl-down { color: var(--red); border-color: rgba(255,51,102,0.3); background: rgba(255,51,102,0.05); }

/* Gauges Row */
.gauges { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
.gauge {
  text-align: center; padding: 10px 6px;
  background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
}
.gauge-val { font-size: 22px; font-weight: 300; color: var(--cyan); }
.gauge-label { font-size: 9px; letter-spacing: 2px; color: var(--dim); margin-top: 3px; text-transform: uppercase; }

/* Data Grid */
.data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.data-item {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
  padding: 10px; text-align: center;
}
.data-val { font-size: 18px; font-weight: 300; color: var(--cyan); }
.data-label { font-size: 8px; letter-spacing: 2px; color: var(--dim); text-transform: uppercase; margin-top: 3px; }
.data-green { color: var(--green); }
.data-red { color: var(--red); }
.data-gold { color: var(--gold); }

/* Chart */
.chart-box { position: relative; height: 160px; margin: 6px 0; }
.chart-box canvas { width: 100% !important; }

/* Log lines */
.log-line {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 6px 10px; font-size: 11px; border-bottom: 1px solid rgba(0,180,255,0.05);
  font-family: inherit;
}
.log-time { color: var(--dim); white-space: nowrap; font-size: 10px; }
.log-action { min-width: 32px; font-size: 11px; }
.log-buy { color: var(--cyan); }
.log-sell { color: var(--green); }
.log-stop { color: var(--red); }
.log-symbol { font-weight: 600; color: var(--cyan2); flex: 1; }
.log-amount { color: var(--text); text-align: right; white-space: nowrap; }
.log-pnl-pos { color: var(--green); }
.log-pnl-neg { color: var(--red); }

/* Position card */
.pos-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 6px; margin-bottom: 6px;
}
.pos-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--cyan); box-shadow: 0 0 8px var(--glow);
  flex-shrink: 0;
}
.pos-info { flex: 1; min-width: 0; }
.pos-name { font-size: 13px; color: var(--cyan); font-weight: 600; }
.pos-meta { font-size: 9px; color: var(--dim); letter-spacing: 1px; }
.pos-entry { font-size: 11px; color: var(--text); }

/* Status bar */
.status-row {
  display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 12px;
}
.status-dot {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 10px; letter-spacing: 2px; color: var(--green);
  text-transform: uppercase;
}
.status-dot::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: var(--green); box-shadow: 0 0 6px var(--green);
  animation: blink 1.5s infinite;
}
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

/* Footer JARVIS */
.jarvis-footer {
  text-align: center; padding: 16px 0; font-size: 10px; color: var(--dim); letter-spacing: 2px;
}
.jarvis-footer span { color: var(--cyan2); }

/* Responsive */
@media (max-width: 380px) {
  .balance-num { font-size: 40px; }
  .gauge-val { font-size: 18px; }
  .data-val { font-size: 16px; }
}
</style>
</head>
<body>

<canvas id="particles"></canvas>
<div class="scanline"></div>

<div class="app" id="app">
  <div style="text-align:center;padding:60px 0;color:var(--dim)">
    <div class="orb" style="margin:0 auto 20px"><div class="orb-inner"></div><div class="orb-ring"></div><div class="orb-ring"></div></div>
    <div style="letter-spacing:4px">INITIALIZING</div>
  </div>
</div>

<script>
const API = 'https://raw.githubusercontent.com/kiwizhk-gif/kiwizhk-gif.github.io/main/dash_data.json';

// Particle system
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let particles = [];
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);
class Particle {
  constructor() { this.reset(); this.y = Math.random() * canvas.height; }
  reset() { this.x = Math.random() * canvas.width; this.y = -5; this.vx = (Math.random()-0.5)*0.5; this.vy = 0.3 + Math.random()*0.7; this.size = Math.random()*1.5+0.5; this.opacity = Math.random()*0.5+0.2; }
  update() { this.x += this.vx; this.y += this.vy; if (this.y > canvas.height+5) this.reset(); if (this.x<0) this.x=canvas.width; if (this.x>canvas.width) this.x=0; }
  draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fillStyle = `rgba(0,200,255,${this.opacity})`; ctx.fill(); }
}
for (let i=0; i<80; i++) particles.push(new Particle());
function animateParticles() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p=>{p.update();p.draw();}); requestAnimationFrame(animateParticles); }
animateParticles();

// Data
async function fetchData() {
  try { const r = await fetch(API+'?t='+Date.now()); if (!r.ok) throw new Error(); return await r.json(); }
  catch(e) { return null; }
}

function f(n,d=4) { return n!=null?Number(n).toFixed(d):'—'; }
function fs(n) { return Number(n).toFixed(2); }
function timeAgo(ts) { const d=(Date.now()/1000)-ts; if(d<60) return Math.floor(d)+'s'; if(d<3600) return Math.floor(d/60)+'m'; return Math.floor(d/3600)+'h'; }

let chart = null;

function render(data) {
  const app = document.getElementById('app');
  if (!data) { app.innerHTML = '<div style="text-align:center;padding:60px"><div style="color:var(--red);letter-spacing:2px">CONNECTION LOST</div><div style="color:var(--dim);font-size:10px;margin-top:8px">Retrying in 30s...</div></div>'; return; }

  const bal = data.balance || 0; const pnl = data.pnl || 0; const trades = data.trades || [];
  const pos = data.positions || []; const tokens = data.tokens_found || 0;
  const solPrice = 145;

  let wins=0,losses=0,totalPnL=0,bigWin=0,bigLoss=0;
  trades.forEach(t=>{
    if(t.type==='SELL'){totalPnL+=t.pnl||0; if(t.pnl>0)wins++;else losses++; if(t.pnl>bigWin)bigWin=t.pnl; if(t.pnl<bigLoss)bigLoss=t.pnl;}
    if(t.type==='STOP'){totalPnL+=t.pnl||0;losses++; if(t.pnl<bigLoss)bigLoss=t.pnl;}
  });
  const totalTrades = wins+losses;
  const winRate = totalTrades>0?(wins/totalTrades*100):0;

  // Chart data
  let cum=0; const cLabels=[],cData=[];
  trades.forEach(t=>{if(t.type==='SELL'||t.type==='STOP'){cum+=t.pnl||0; cLabels.push(t.symbol); cData.push(cum.toFixed(6));}});

  const now = new Date().toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});

  app.innerHTML = `
    <!-- Orb -->
    <div class="orb-section">
      <div style="font-size:9px;letter-spacing:3px;color:var(--dim);margin-bottom:4px">J.A.R.V.I.S.</div>
      <div class="orb"><div class="orb-inner"></div><div class="orb-ring"></div><div class="orb-ring"></div></div>
      <div class="jarvis-greeting">At your service, sir. All systems operational.</div>
    </div>

    <!-- Status -->
    <div class="status-row">
      <span class="status-dot">ONLINE</span>
      <span style="font-size:10px;color:var(--dim);letter-spacing:2px">${now} ICT</span>
      <span style="font-size:10px;color:var(--dim);letter-spacing:2px">🪙 ${tokens}</span>
    </div>

    <!-- Balance -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">PORTFOLIO</span>
        <span class="panel-badge">SOL</span>
      </div>
      <div class="hero">
        <div class="balance-num">${fs(bal)}</div>
        <div class="balance-unit">SOL · $${fs(bal*solPrice)} USD</div>
        <div class="pnl-hero ${pnl>=0?'pnl-up':'pnl-down'}">
          ${pnl>=0?'▲':'▼'} ${pnl>=0?'+':''}${f(pnl)} SOL
        </div>
      </div>
    </div>

    <!-- Gauges -->
    <div class="gauges">
      <div class="gauge"><div class="gauge-val">${totalTrades}</div><div class="gauge-label">TRADES</div></div>
      <div class="gauge"><div class="gauge-val ${winRate>=50?'':'data-red'}">${winRate.toFixed(0)}%</div><div class="gauge-label">WIN RATE</div></div>
      <div class="gauge"><div class="gauge-val">${pos.length}</div><div class="gauge-label">ACTIVE</div></div>
    </div>

    <!-- Stats -->
    <div class="data-grid">
      <div class="data-item"><div class="data-val data-green">${wins}</div><div class="data-label">WINS</div></div>
      <div class="data-item"><div class="data-val data-red">${losses}</div><div class="data-label">LOSSES</div></div>
      <div class="data-item"><div class="data-val data-gold">+${f(bigWin)}</div><div class="data-label">BEST</div></div>
      <div class="data-item"><div class="data-val data-red">${f(bigLoss)}</div><div class="data-label">WORST</div></div>
    </div>

    <!-- Chart -->
    ${cData.length>=2?`
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">PERFORMANCE</span>
        <span class="panel-badge">CUMULATIVE</span>
      </div>
      <div class="chart-box"><canvas id="pnlChart"></canvas></div>
    </div>`:''}

    <!-- Positions -->
    ${pos.length>0?`
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">ACTIVE POSITIONS</span>
        <span class="panel-badge">${pos.length}</span>
      </div>
      ${pos.map(p=>`
        <div class="pos-row">
          <div class="pos-dot"></div>
          <div class="pos-info">
            <div class="pos-name">$${p.symbol}</div>
            <div class="pos-meta">MCAP $${(p.mcap||0).toLocaleString()} · ${timeAgo(Date.now()/1000-p.age||0)}</div>
          </div>
          <div class="pos-entry">${f(p.entry_sol)} SOL</div>
        </div>
      `).join('')}
    </div>`:''}

    <!-- Trade Log -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">TRANSACTION LOG</span>
        <span class="panel-badge">${trades.length}</span>
      </div>
      ${trades.slice(-20).reverse().map(t=>`
        <div class="log-line">
          <span class="log-time">${timeAgo(t.time)}</span>
          <span class="log-action ${t.type==='BUY'?'log-buy':t.type==='SELL'?'log-sell':'log-stop'}">${t.type==='BUY'?'▶':t.type==='SELL'?'◆':'■'}</span>
          <span class="log-symbol">$${t.symbol||'???'}</span>
          <span class="log-amount">${f(t.sol)} SOL</span>
          ${t.pnl!=null?`<span class="log-amount ${t.pnl>=0?'log-pnl-pos':'log-pnl-neg'}">${t.pnl>=0?'+':''}${f(t.pnl)}</span>`:''}
        </div>
      `).join('')}
      ${trades.length===0?'<div style="text-align:center;color:var(--dim);padding:20px;font-size:10px;letter-spacing:2px">AWAITING SIGNAL...</div>':''}
    </div>

    <!-- Footer -->
    <div class="jarvis-footer">
      <span>J.A.R.V.I.S.</span> · TRADING INTELLIGENCE · v8
      <div style="margin-top:4px;font-size:8px;color:var(--dim)">AUTO-REFRESH 30S</div>
    </div>
  `;

  // Chart
  if (cData.length>=2) setTimeout(()=>{
    const cvs=document.getElementById('pnlChart'); if(!cvs||chart) return;
    const lastVal = parseFloat(cData[cData.length-1]);
    chart = new Chart(cvs, {
      type:'line',
      data:{labels:cLabels,datasets:[{
        data:cData, borderColor:lastVal>=0?'#00ff88':'#ff3366',
        backgroundColor:ctx=>{const g=ctx.chart.ctx.createLinearGradient(0,0,0,160); g.addColorStop(0,lastVal>=0?'rgba(0,255,136,0.15)':'rgba(255,51,102,0.15)');g.addColorStop(1,'transparent');return g;},
        borderWidth:1.5,fill:true,tension:0.4,pointRadius:2,pointBackgroundColor:lastVal>=0?'#00ff88':'#ff3366'
      }]},
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{
          x:{grid:{color:'rgba(0,180,255,0.05)'},ticks:{color:'#406080',font:{size:8}}},
          y:{grid:{color:'rgba(0,180,255,0.05)'},ticks:{color:'#406080',font:{size:8},callback:v=>v+' SOL'}}
        }
      }
    });
  },200);
}

// Init
fetchData().then(render);
setInterval(async()=>{
  const data = await fetchData();
  if(data){ if(chart){chart.destroy();chart=null;} render(data); }
},30000);
</script>
</body>
</html>
